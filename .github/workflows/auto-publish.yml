name: Auto-publish

on:
  schedule:
    # :17 кожну годину, 5:17-18:17 UTC = 8:17-21:17 Kyiv (UTC+3)
    - cron: '17 5-18 * * *'
  workflow_dispatch: # ручний запуск для тестів

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run auto-publisher
        run: node tools/auto-publish.mjs
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
